<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 학습지</title>
<style>
  :root {
    --bg: #14161b; --card: #1d2027; --text: #eceae4; --sub: #a4a29a;
    --accent: #e5735f; --border: #33373f; --btn: #272b34;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; min-height: 100vh; padding: 24px 12px;
  }
  .app { width: 100%; max-width: 820px; }
  h1 { font-size: 25px; margin-bottom: 10px; }
  .intro { color: var(--sub); font-size: 16px; line-height: 1.7; margin-bottom: 22px; }
  .sheet-list { margin-bottom: 14px; }
  .to-list {
    display: inline-block; padding: 8px 14px; border-radius: 18px;
    border: 1px solid var(--border); background: var(--btn);
    color: var(--sub); text-decoration: none; font-size: 14px;
  }
  .to-list:hover { border-color: var(--accent); color: var(--text); }
  .back {
    position: fixed; top: 12px; left: 12px; z-index: 30;
    background: var(--card); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 10px;
    color: var(--accent); font-size: 16px; font-weight: 700; text-decoration: none;
  }
  .back:hover { border-color: var(--accent); }
  h2 { font-size: 20px; color: var(--accent); margin: 26px 0 6px; }
  .note { color: var(--sub); font-size: 15px; margin-bottom: 12px; line-height: 1.6; }
  .kana-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 620px) { .kana-grid { grid-template-columns: 1fr; } }
  .kcard {
    display: flex; align-items: center; gap: 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .kcard:hover { border-color: var(--accent); }
  .kcard .big { font-size: 52px; font-family: "Yu Gothic", "Meiryo", "Noto Sans JP", sans-serif; flex-shrink: 0; width: 64px; text-align: center; }
  .kcard .info .sound { font-size: 18px; font-weight: 700; }
  .kcard .info .origin { font-size: 15px; color: var(--accent); font-family: "Yu Gothic", "Meiryo", sans-serif; margin-top: 2px; }
  .kcard .info .tip { font-size: 14px; color: var(--sub); margin-top: 3px; line-height: 1.5; }
  .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 620px) { .word-grid { grid-template-columns: 1fr; } }
  .wcard {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; cursor: pointer;
  }
  .wcard:hover { border-color: var(--accent); }
  .wcard .jp { font-size: 26px; font-family: "Yu Gothic", "Meiryo", sans-serif; }
  .wcard .rom { color: var(--sub); font-size: 14px; }
  .wcard .mean { margin-left: auto; font-size: 16px; text-align: right; }
</style>
</head>
<body>
<script src="/nav.js"></script>
<div class="app">
  <h1 id="title">오늘의 학습지</h1>
  <div class="sheet-list" id="sheetList"></div>
  <div class="intro" id="intro"></div>
  <div id="content">불러오는 중...</div>
</div>

<script>
"use strict";
const audioCache = {};
(window.__ttsCaches = window.__ttsCaches || []).push(audioCache); // 설정 서랍이 성우 변경 시 비움
let currentAudio = null;
let speakSeq = 0; // 연타 시 늦게 도착한 소리는 버린다
async function speak(t) {
  const seq = ++speakSeq;
  try {
    if (!audioCache[t]) {
      const res = await fetch("/api/tts?text=" + encodeURIComponent(t) + "&_v=" + (localStorage.getItem("ttsVer") || "0"));
      if (!res.ok) throw new Error("tts");
      audioCache[t] = new Audio(URL.createObjectURL(await res.blob()));
    }
    if (seq !== speakSeq) return; // 그 사이 다른 걸 눌렀으면 이 소리는 버림
    if (currentAudio) currentAudio.pause();
    currentAudio = audioCache[t];
    currentAudio.currentTime = 0;
    currentAudio.play();
  } catch { /* 무음 진행 */ }
}

let sheets = [];

// 라우팅: /sheet.html = 최신(오늘), /sheet.html?day=N = 해당 일차. 목록은 /sheets.html
fetch("/sheets.json").then(r => r.json()).then(all => {
  sheets = all;
  const want = new URLSearchParams(location.search).get("day");
  let idx = 0;
  if (want !== null) {
    const found = sheets.findIndex(s => String(s.day) === want);
    if (found >= 0) idx = found;
  }
  renderSheet(idx);
});

function renderSheet(idx) {
  const d = sheets[idx];
  const listEl = document.getElementById("sheetList");
  listEl.innerHTML = `<a class="to-list" href="/sheets">📚 학습지 목록 보기</a>`;
  document.getElementById("title").textContent = d.title;
  document.getElementById("intro").textContent = d.intro || "";
  document.title = d.title;
  const box = document.getElementById("content");
  box.innerHTML = "";
  for (const sec of d.sections) {
    const h = document.createElement("h2");
    h.textContent = sec.name;
    box.appendChild(h);
    if (sec.note) {
      const n = document.createElement("div");
      n.className = "note"; n.textContent = sec.note;
      box.appendChild(n);
    }
    const grid = document.createElement("div");
    if (sec.type === "words") {
      grid.className = "word-grid";
      for (const it of sec.items) {
        const c = document.createElement("div");
        c.className = "wcard";
        c.innerHTML = `<span class="jp">${it.word}</span><span class="rom">${it.romaji}</span><span class="mean">${it.mean}</span>`;
        c.onclick = () => speak(it.word);
        grid.appendChild(c);
      }
    } else {
      grid.className = "kana-grid";
      for (const it of sec.items) {
        const c = document.createElement("div");
        c.className = "kcard";
        c.innerHTML = `<div class="big">${it.kana}</div><div class="info">
          <div class="sound">${it.sound}</div>
          ${it.origin ? `<div class="origin">${it.origin}</div>` : ""}
          ${it.tip ? `<div class="tip">${it.tip}</div>` : ""}</div>`;
        c.onclick = () => speak(it.kana);
        grid.appendChild(c);
      }
    }
    box.appendChild(grid);
  }
}
</script>
</body>
</html>
